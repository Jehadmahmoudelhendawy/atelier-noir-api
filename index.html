<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atelier Noir AI API</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            text-align: center;
            border: 1px solid #334155;
            padding: 40px;
            border-radius: 12px;
            background-color: #1e293b;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
        }
        h1 {
            color: #38bdf8;
            margin-top: 0;
        }
        p {
            color: #94a3b8;
            font-size: 1.1rem;
        }
        .status {
            display: inline-block;
            background-color: #10b981;
            color: #ffffff;
            padding: 6px 12px;
            border-radius: 9999px;
            font-size: 0.875rem;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Atelier Noir AI API</h1>
        <p>The serverless API backend is running successfully on Vercel.</p>
        <span class="status">Active & Online</span>
    </div>
</body>
</html>
